  <text class="txt l16" x="20" y="445" fill="#ffffff"><tspan fill="#00ff41">cse</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ </tspan></text>
