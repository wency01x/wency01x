<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" width="580" height="420">
  <style>
    .txt { font-family: 'Courier New', monospace; font-size: 13px; }
    text { opacity: 0; }
    .l1  { animation: show .1s 0.3s forwards; }
    .l2  { animation: show .1s 0.6s forwards; }
    .l3  { animation: show .1s 1.1s forwards; }
    .l4  { animation: show .1s 1.5s forwards; }
    .l5  { animation: show .1s 1.9s forwards; }
    .l6  { animation: show .1s 2.3s forwards; }
    .l7  { animation: show .1s 2.7s forwards; }
    .l8  { animation: show .1s 3.1s forwards; }
    .l9  { animation: show .1s 3.6s forwards; }
    .l10 { animation: show .1s 4.0s forwards; }
    .l11 { animation: show .1s 4.4s forwards; }
    .l12 { animation: show .1s 4.8s forwards; }
    .l13 { animation: show .1s 5.2s forwards; }
    .l14 { animation: show .1s 5.7s forwards; }
    .l15 { animation: show .1s 6.1s forwards; }
    .l16 { animation: show .1s 6.5s forwards; }
    .cur { animation: blink 1s 6.6s infinite; opacity: 0; }
    @keyframes show  { to { opacity: 1; } }
    @keyframes blink { 0%,100%{ opacity:0; } 50%{ opacity:1; } }
  </style>

  <!-- Background -->
  <rect width="580" height="420" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="580" height="36" rx="10" fill="#1c2128"/>
  <rect y="18" width="580" height="18" fill="#1c2128"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="290" y="23" text-anchor="middle" class="txt" font-size="12" fill="#6a737d" opacity="1">wency@ubuntu: ~</text>

  <!-- Boot lines -->
  <text class="txt l1" x="20" y="62"><tspan fill="#00ff41">Initializing terminal...</tspan></text>
  <text class="txt l2" x="20" y="80"><tspan fill="#00ff41">[OK] System ready</tspan></text>

  <!-- whoami -->
  <text class="txt l3" x="20" y="112">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#fff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#fff">:~$ </tspan><tspan fill="#fff">whoami</tspan>
  </text>
  <text class="txt l4" x="20" y="132"><tspan fill="#febc2e">Name     : </tspan><tspan fill="#fff">Wency Casiño</tspan></text>
  <text class="txt l5" x="20" y="150"><tspan fill="#febc2e">Role     : </tspan><tspan fill="#fff">Backend Engineer</tspan></text>
  <text class="txt l6" x="20" y="168"><tspan fill="#febc2e">Field    : </tspan><tspan fill="#fff">Computer Science</tspan></text>
  <text class="txt l7" x="20" y="186"><tspan fill="#febc2e">Focus    : </tspan><tspan fill="#fff">APIs • Databases • Scalable Systems</tspan></text>
  <text class="txt l8" x="20" y="204"><tspan fill="#6a737d">------------------------------------------</tspan></text>

  <!-- cat skills -->
  <text class="txt l9" x="20" y="234">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#fff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#fff">:~$ </tspan><tspan fill="#fff">cat skills.txt</tspan>
  </text>
  <text class="txt l10" x="20" y="258"><tspan fill="#febc2e">Backend  : </tspan><tspan fill="#fff">FastAPI, GraphQL, SQLAlchemy</tspan></text>
  <text class="txt l11" x="20" y="276"><tspan fill="#febc2e">Database : </tspan><tspan fill="#fff">PostgreSQL, MySQL, SQLite</tspan></text>
  <text class="txt l12" x="20" y="294"><tspan fill="#febc2e">Languages: </tspan><tspan fill="#fff">Python, SQL</tspan></text>
  <text class="txt l13" x="20" y="312"><tspan fill="#6a737d">------------------------------------------</tspan></text>

  <!-- echo status -->
  <text class="txt l14" x="20" y="344">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#fff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#fff">:~$ </tspan><tspan fill="#fff">echo $STATUS</tspan>
  </text>
  <text class="txt l15" x="20" y="364"><tspan fill="#00ff41">building scalable backend systems...</tspan></text>

  <!-- prompt + cursor -->
  <text class="txt l16" x="20" y="396">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#fff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#fff">:~$ </tspan>
  </text>
  <rect class="cur" x="110" y="384" width="9" height="15" fill="#00ff41"/>
</svg>