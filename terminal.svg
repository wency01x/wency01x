<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" width="750" height="480">
  <style>
    .txt { font-family: "Courier New", monospace; font-size: 16px; }
    text { opacity: 0; }
    .l1  { animation: l1  30s ease infinite; }
    .l2  { animation: l2  30s ease infinite; }
    .l3  { animation: l3  30s ease infinite; }
    .l4  { animation: l4  30s ease infinite; }
    .l5  { animation: l5  30s ease infinite; }
    .l6  { animation: l6  30s ease infinite; }
    .l7  { animation: l7  30s ease infinite; }
    .l8  { animation: l8  30s ease infinite; }
    .l9  { animation: l9  30s ease infinite; }
    .l10 { animation: l10 30s ease infinite; }
    .l11 { animation: l11 30s ease infinite; }
    .l12 { animation: l12 30s ease infinite; }
    .l13 { animation: l13 30s ease infinite; }
    .l14 { animation: l14 30s ease infinite; }
    .l15 { animation: l15 30s ease infinite; }
    .l16 { animation: l16 30s ease infinite; }
    @keyframes l1  { 0%,1%  {opacity:0;} 2%,76%  {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l2  { 0%,3%  {opacity:0;} 4%,76%  {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l3  { 0%,5%  {opacity:0;} 7%,76%  {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l4  { 0%,7%  {opacity:0;} 9%,76%  {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l5  { 0%,9%  {opacity:0;} 11%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l6  { 0%,11% {opacity:0;} 13%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l7  { 0%,13% {opacity:0;} 15%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l8  { 0%,15% {opacity:0;} 17%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l9  { 0%,18% {opacity:0;} 20%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l10 { 0%,20% {opacity:0;} 22%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l11 { 0%,22% {opacity:0;} 24%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l12 { 0%,24% {opacity:0;} 26%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l13 { 0%,26% {opacity:0;} 28%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l14 { 0%,29% {opacity:0;} 31%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l15 { 0%,31% {opacity:0;} 33%,76% {opacity:1;} 80%,100%{opacity:0;} }
    @keyframes l16 { 0%,33% {opacity:0;} 35%,76% {opacity:1;} 80%,100%{opacity:0;} }
  </style>
  <rect width="750" height="480" rx="10" fill="#0d1117"/>
  <rect width="750" height="36" rx="10" fill="#1c2128"/>
  <rect y="18" width="750" height="18" fill="#1c2128"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
