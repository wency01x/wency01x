  <text class="txt l13" x="20" y="351" fill="#6a737d">------------------------------------------</text>
  <text class="txt l14" x="20" y="385" fill="#ffffff"><tspan fill="#00ff41">wency</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ echo $STATUS</tspan></text>
  <text class="txt l15" x="20" y="408" fill="#00ff41">building scalable backend systems...</text>
  <text class="txt l16" x="20" y="445" fill="#ffffff"><tspan fill="#00ff41">wency</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ </tspan></text>
