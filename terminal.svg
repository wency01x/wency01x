<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" width="750" height="480">
  <style>
    .txt { font-family: 'Courier New', monospace; font-size: 16px; }
    text { opacity: 0; }
    .l1  { animation: show .05s 0.3s forwards; }
    .l2  { animation: show .05s 0.7s forwards; }
    .l3  { animation: show .05s 1.2s forwards; }
    .l4  { animation: show .05s 1.6s forwards; }
    .l5  { animation: show .05s 2.0s forwards; }
    .l6  { animation: show .05s 2.4s forwards; }
    .l7  { animation: show .05s 2.8s forwards; }
    .l8  { animation: show .05s 3.2s forwards; }
    .l9  { animation: show .05s 3.7s forwards; }
    .l10 { animation: show .05s 4.1s forwards; }
    .l11 { animation: show .05s 4.5s forwards; }
    .l12 { animation: show .05s 4.9s forwards; }
    .l13 { animation: show .05s 5.3s forwards; }
    .l14 { animation: show .05s 5.8s forwards; }
    .l15 { animation: show .05s 6.2s forwards; }
    .l16 { animation: show .05s 6.6s forwards; }
    .cur { animation: blink 1s 6.8s 3 forwards; opacity: 0; }
    @keyframes show  { to { opacity: 1; } }
    @keyframes blink { 0%,100% { opacity:0; } 50% { opacity:1; } }
  </style>

  <rect width="750" height="480" rx="10" fill="#0d1117"/>
  <rect width="750" height="36" rx="10" fill="#1c2128"/>
  <rect y="18" width="750" height="18" fill="#1c2128"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="375" y="23" text-anchor="middle" font-family="Courier New" font-size="13" fill="#6a737d" opacity="1">wency@ubuntu: ~</text>

  <text class="txt l1"  x="20" y="68"  fill="#00ff41">Initializing terminal...</text>
  <text class="txt l2"  x="20" y="90"  fill="#00ff41">[OK] System ready</text>

  <text class="txt l3"  x="20" y="126" fill="#ffffff">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ whoami</tspan>
  </text>
  <text class="txt l4"  x="20" y="152" fill="#ffffff"><tspan fill="#febc2e">Name     : </tspan>Wency Casino</text>
  <text class="txt l5"  x="20" y="172" fill="#ffffff"><tspan fill="#febc2e">Role     : </tspan>Backend Engineer</text>
  <text class="txt l6"  x="20" y="192" fill="#ffffff"><tspan fill="#febc2e">Field    : </tspan>Computer Science</text>
  <text class="txt l7"  x="20" y="212" fill="#ffffff"><tspan fill="#febc2e">Focus    : </tspan>APIs - Databases - Scalable Systems</text>
  <text class="txt l8"  x="20" y="232" fill="#6a737d">------------------------------------------</text>

  <text class="txt l9"  x="20" y="265" fill="#ffffff">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ cat skills.txt</tspan>
  </text>
  <text class="txt l10" x="20" y="291" fill="#ffffff"><tspan fill="#febc2e">Backend  : </tspan>FastAPI, GraphQL, SQLAlchemy</text>
  <text class="txt l11" x="20" y="311" fill="#ffffff"><tspan fill="#febc2e">Database : </tspan>PostgreSQL, MySQL, SQLite</text>
  <text class="txt l12" x="20" y="331" fill="#ffffff"><tspan fill="#febc2e">Languages: </tspan>Python, SQL</text>
  <text class="txt l13" x="20" y="351" fill="#6a737d">------------------------------------------</text>

  <text class="txt l14" x="20" y="385" fill="#ffffff">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ echo $STATUS</tspan>
  </text>
  <text class="txt l15" x="20" y="408" fill="#00ff41">building scalable backend systems...</text>

  <text class="txt l16" x="20" y="445" fill="#ffffff">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ </tspan>
  </text>

  <!-- cursor only appears after last line, blinks 3 times then stays -->
  <rect class="cur" x="120" y="433" width="10" height="16" fill="#00ff41"/>
</svg>