<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 450" width="620" height="450">
  <style>
    .txt { font-family: 'Courier New', monospace; font-size: 15px; }
    text { opacity: 0; }
    .l1  { animation: show .1s 0.3s forwards; }
    .l2  { animation: show .1s 0.7s forwards; }
    .l3  { animation: show .1s 1.2s forwards; }
    .l4  { animation: show .1s 1.7s forwards; }
    .l5  { animation: show .1s 2.1s forwards; }
    .l6  { animation: show .1s 2.5s forwards; }
    .l7  { animation: show .1s 2.9s forwards; }
    .l8  { animation: show .1s 3.3s forwards; }
    .l9  { animation: show .1s 3.8s forwards; }
    .l10 { animation: show .1s 4.2s forwards; }
    .l11 { animation: show .1s 4.6s forwards; }
    .l12 { animation: show .1s 5.0s forwards; }
    .l13 { animation: show .1s 5.4s forwards; }
    .l14 { animation: show .1s 5.9s forwards; }
    .l15 { animation: show .1s 6.3s forwards; }
    .l16 { animation: show .1s 6.7s forwards; }
    .cur { animation: blink 1s 6.8s infinite; opacity: 0; }
    @keyframes show  { to { opacity: 1; } }
    @keyframes blink { 0%,100%{ opacity:0; } 50%{ opacity:1; } }
  </style>

  <!-- Background -->
  <rect width="620" height="450" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="620" height="36" rx="10" fill="#1c2128"/>
  <rect y="18" width="620" height="18" fill="#1c2128"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="310" y="23" text-anchor="middle" font-family="Courier New" font-size="13" fill="#6a737d" opacity="1">wency@ubuntu: ~</text>

  <!-- Boot -->
  <text class="txt l1" x="20" y="65"><tspan fill="#00ff41">Initializing terminal...</tspan></text>
  <text class="txt l2" x="20" y="86"><tspan fill="#00ff41">[OK] System ready</tspan></text>

  <!-- whoami -->
  <text class="txt l3" x="20" y="120">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#fff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#fff">:~$ whoami</tspan>
  </text>
  <text class="txt l4" x="20" y="146"><tspan fill="#febc2e">Name     : </tspan><tspan fill="#fff">Wency Casiño</tspan></text>
  <text class="txt l5" x="20" y="166"><tspan fill="#febc2e">Role     : </tspan><tspan fill="#fff">Backend Engineer</tspan></text>
  <text class="txt l6" x="20" y="186"><tspan fill="#febc2e">Field    : </tspan><tspan fill="#fff">Computer Science</tspan></text>
  <text class="txt l7" x="20" y="206"><tspan fill="#febc2e">Focus    : </tspan><tspan fill="#fff">APIs • Databases • Scalable Systems</tspan></text>
  <text class="txt l8" x="20" y="226"><tspan fill="#6a737d">------------------------------------------</tspan></text>

  <!-- skills -->
  <text class="txt l9" x="20" y="258">
    <tspan fill="#00ff41">wency</tspan><tspan fill="#fff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#fff">:~$ cat skills.txt</tspan>
  </text>
  <text class="txt l10" x="20" y="284"><tspan fill="#febc2e">Backend  : </tspan><tspan fill="#fff">FastAPI, GraphQL, SQLAlchemy</tspan></text>
  <text class="txt l11" x="20" y="304"><tspan fill="#febc2e">Database : </tspan><tspan fill="#fff">PostgreSQL, MySQL, SQLite</tspan></text>
