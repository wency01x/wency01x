<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" width="750" height="480">
  <style>
    .txt { font-family: 'Courier New', monospace; font-size: 16px; }
    text { opacity: 0; }
    .l1  { animation: l1  25s 0s infinite; }
    .l2  { animation: l2  25s 0s infinite; }
    .l3  { animation: l3  25s 0s infinite; }
    .l4  { animation: l4  25s 0s infinite; }
    .l5  { animation: l5  25s 0s infinite; }
    .l6  { animation: l6  25s 0s infinite; }
    .l7  { animation: l7  25s 0s infinite; }
    .l8  { animation: l8  25s 0s infinite; }
    .l9  { animation: l9  25s 0s infinite; }
    .l10 { animation: l10 25s 0s infinite; }
    .l11 { animation: l11 25s 0s infinite; }
    .l12 { animation: l12 25s 0s infinite; }
    .l13 { animation: l13 25s 0s infinite; }
    .l14 { animation: l14 25s 0s infinite; }
    .l15 { animation: l15 25s 0s infinite; }
    .l16 { animation: l16 25s 0s infinite; }
    .cur { animation: blink 1s 0s infinite; }
    @keyframes l1  { 2%,76%  { opacity:0; } 5%,72%  { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l2  { 5%,76%  { opacity:0; } 8%,72%  { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l3  { 8%,76%  { opacity:0; } 12%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l4  { 12%,76% { opacity:0; } 16%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l5  { 16%,76% { opacity:0; } 20%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l6  { 20%,76% { opacity:0; } 24%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l7  { 24%,76% { opacity:0; } 28%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l8  { 28%,76% { opacity:0; } 32%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l9  { 32%,76% { opacity:0; } 37%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l10 { 37%,76% { opacity:0; } 41%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l11 { 41%,76% { opacity:0; } 45%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l12 { 45%,76% { opacity:0; } 49%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l13 { 49%,76% { opacity:0; } 53%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l14 { 53%,76% { opacity:0; } 57%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l15 { 57%,76% { opacity:0; } 61%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes l16 { 61%,76% { opacity:0; } 65%,72% { opacity:1; } 80%,100% { opacity:0; } }
    @keyframes blink { 0%,100% { opacity:0; } 50% { opacity:1; } }
  </style>

  <rect width="750" height="480" rx="10" fill="#0d1117"/>
  <rect width="750" height="36" rx="10" fill="#1c2128"/>
  <rect y="18" width="750" height="18" fill="#1c2128"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="375" y="23" text-anchor="middle" font-family="Courier New" font-size="13" fill="#6a737d" opacity="1">wency@ubuntu: ~</text>

  <text class="txt l1" x="20" y="68" fill="#00ff41">Initializing terminal...</text>
  <text class="txt l2" x="20" y="90" fill="#00ff41">[OK] System ready</text>

  <text class="txt l3" x="20" y="126" fill="#ffffff">
    <tspan fill="#00ff41">cy</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ whoami</tspan>
  </text>
  <text class="txt l4"  x="20" y="152" fill="#ffffff"><tspan fill="#febc2e">Name     : </tspan>Wency Casino</text>
  <text class="txt l5"  x="20" y="172" fill="#ffffff"><tspan fill="#febc2e">Role     : </tspan>Backend Engineer</text>
  <text class="txt l6"  x="20" y="192" fill="#ffffff"><tspan fill="#febc2e">Field    : </tspan>Computer Science</text>
  <text class="txt l7"  x="20" y="212" fill="#ffffff"><tspan fill="#febc2e">Focus    : </tspan>APIs - Databases - Scalable Systems</text>
  <text class="txt l8"  x="20" y="232" fill="#6a737d">------------------------------------------</text>

  <text class="txt l9"  x="20" y="265" fill="#ffffff">
    <tspan fill="#00ff41">cy</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ cat skills.txt</tspan>
  </text>
  <text class="txt l10" x="20" y="291" fill="#ffffff"><tspan fill="#febc2e">Backend  : </tspan>FastAPI, GraphQL, SQLAlchemy</text>
  <text class="txt l11" x="20" y="311" fill="#ffffff"><tspan fill="#febc2e">Database : </tspan>PostgreSQL, MySQL, SQLite</text>
  <text class="txt l12" x="20" y="331" fill="#ffffff"><tspan fill="#febc2e">Languages: </tspan>Python, SQL</text>
  <text class="txt l13" x="20" y="351" fill="#6a737d">------------------------------------------</text>

  <text class="txt l14" x="20" y="385" fill="#ffffff">
    <tspan fill="#00ff41">cy</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ echo $STATUS</tspan>
  </text>
  <text class="txt l15" x="20" y="408" fill="#00ff41">building scalable backend systems...</text>

  <text class="txt l16" x="20" y="442" fill="#ffffff">
    <tspan fill="#00ff41">cy</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#56b6c2">ubuntu</tspan><tspan fill="#ffffff">:~$ </tspan>
  </text>
  <rect class="cur" x="120" y="430" width="10" height="16" fill="#00ff41"/>
</svg>