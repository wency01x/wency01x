<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <style>
    .txt  { font-family: 'Courier New', monospace; font-size: 13px; fill: #ffffff; }
    text { opacity: 0; }
    .l1  { animation: show .1s 0.3s forwards; }
    .l2  { animation: show .1s 0.6s forwards; }
    .l3  { animation: show .1s 1.0s forwards; }
    .l4  { animation: show .1s 1.5s forwards; }
    .l5  { animation: show .1s 1.9s forwards; }
    .l6  { animation: show .1s 2.3s forwards; }
    .l7  { animation: show .1s 2.7s forwards; }
    .l8  { animation: show .1s 3.1s forwards; }
    .l9  { animation: show .1s 3.5s forwards; }
    .l10 { animation: show .1s 3.9s forwards; }
    .l11 { animation: show .1s 4.3s forwards; }
    .l12 { animation: show .1s 4.7s forwards; }
    .l13 { animation: show .1s 5.1s forwards; }
    .l14 { animation: show .1s 5.5s forwards; }
    .l15 { animation: show .1s 5.9s forwards; }
    .cur { animation: blink 1s 6.0s infinite; opacity: 0; }
    @keyframes show  { to { opacity: 1; } }
    @keyframes blink { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="10" fill="#1c2128"/>
  <rect y="18" width="800" height="18" fill="#1c2128"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="23" text-anchor="middle" font-family="Courier New" font-size="12" fill="#6a737d">wency-dev — terminal</text>

  <!-- Lines -->
  <text class="txt l1"  x="20" y="65"><tspan fill="#00ff41">Initializing terminal...</tspan></text>
  <text class="txt l2"  x="20" y="85"><tspan fill="#00ff41">[OK] System ready</tspan></text>

  <text class="txt l3"  x="20" y="120"><tspan fill="#56b6c2">wency-dev@github</tspan><tspan fill="#fff"> ~> whoami</tspan></text>
  <text class="txt l4"  x="20" y="145"><tspan fill="#febc2e">Name     : </tspan><tspan fill="#fff">Wency Casiño</tspan></text>
  <text class="txt l5"  x="20" y="163"><tspan fill="#febc2e">Role     : </tspan><tspan fill="#fff">Backend Engineer</tspan></text>
  <text class="txt l6"  x="20" y="181"><tspan fill="#febc2e">Field    : </tspan><tspan fill="#fff">Computer Science</tspan></text>
  <text class="txt l7"  x="20" y="199"><tspan fill="#febc2e">Focus    : </tspan><tspan fill="#fff">APIs • Databases • Scalable Systems</tspan></text>
  <text class="txt l8"  x="20" y="217"><tspan fill="#6a737d">==========================================</tspan></text>

  <text class="txt l9"  x="20" y="252"><tspan fill="#56b6c2">wency-dev@github</tspan><tspan fill="#fff"> ~> cat skills.txt</tspan></text>
  <text class="txt l10" x="20" y="277"><tspan fill="#febc2e">Backend  : </tspan><tspan fill="#fff">FastAPI, GraphQL, SQLAlchemy</tspan></text>
  <text class="txt l11" x="20" y="295"><tspan fill="#febc2e">Database : </tspan><tspan fill="#fff">PostgreSQL, MySQL, SQLite</tspan></text>
  <text class="txt l12" x="20" y="313"><tspan fill="#febc2e">Languages: </tspan><tspan fill="#fff">Python, SQL</tspan></text>
  <text class="txt l13" x="20" y="331"><tspan fill="#6a737d">==========================================</tspan></text>

  <text class="txt l14" x="20" y="366"><tspan fill="#56b6c2">wency-dev@github</tspan><tspan fill="#fff"> ~> echo $STATUS</tspan></text>
  <text class="txt l15" x="20" y="386"><tspan fill="#00ff41">building scalable backend systems...</tspan></text>

  <text class="txt l15" x="20" y="420"><tspan fill="#56b6c2">wency-dev@github</tspan><tspan fill="#fff"> ~> </tspan></text>

  <!-- Blinking cursor -->
  <rect class="cur" x="176" y="408" width="9" height="15" fill="#00ff41"/>
</svg>